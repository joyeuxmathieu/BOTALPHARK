<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>BOTALPHARK</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:#020617;
overflow-x:hidden;
}

/* FOND ARK */

.space{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center,#0f172a,#020617);
z-index:-3;
}

/* ETOILES */

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:moveStars 90s linear infinite;
z-index:-2;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

/* PARTICULES */

.particles{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#00e5ff22 1px, transparent 1px);
background-size:40px 40px;
animation:particlesMove 40s linear infinite;
z-index:-1;
}

@keyframes particlesMove{
from{background-position:0 0;}
to{background-position:2000px 1000px;}
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
opacity:0.8;
}

nav a:hover{
opacity:1;
}

/* HERO */

.hero{
text-align:center;
padding-top:120px;
padding-bottom:160px;
}

/* HALO TEK */

.halo{
position:absolute;
left:50%;
transform:translateX(-50%);
width:350px;
height:350px;
border-radius:50%;
background:radial-gradient(circle,#00e5ff44,transparent);
filter:blur(40px);
z-index:-1;
}

/* LOGO */

.logo{
width:200px;
border-radius:20px;

box-shadow:
0 0 20px #00e5ff,
0 0 40px #00e5ff,
0 0 80px #00e5ff;

animation:glow 3s infinite alternate;
}

@keyframes glow{

0%{
box-shadow:0 0 20px #00e5ff;
}

100%{
box-shadow:
0 0 40px #00e5ff,
0 0 80px #00e5ff,
0 0 120px #00e5ff;
}

}

/* TITRE */

.hero h1{
font-size:70px;
margin:10px;
}

/* BOUTONS */

.button{
background:linear-gradient(45deg,#00e5ff,#4f46e5);
border:none;
padding:15px 35px;
color:white;
font-size:18px;
border-radius:12px;
cursor:pointer;
margin:10px;
box-shadow:0 0 20px rgba(0,229,255,0.7);
transition:0.3s;
}

.button:hover{
transform:scale(1.1);
box-shadow:0 0 40px rgba(0,229,255,1);
}

/* STATS */

.stats{
display:flex;
justify-content:center;
gap:80px;
padding:80px;
}

.stat{
text-align:center;
}

.stat h2{
font-size:40px;
color:#00e5ff;
}

/* FEATURES */

.features{
padding:100px 50px;
display:flex;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:#111827;
padding:30px;
margin:20px;
border-radius:15px;
width:260px;
text-align:center;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px rgba(0,229,255,0.5);
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
opacity:0.6;
}

</style>

</head>

<body>

<div class="space"></div>
<div class="stars"></div>
<div class="particles"></div>

<nav>



<div>
<a href="#">Accueil</a>
<a href="#">Fonctions</a>
<a href="#">Commandes</a>
<a href="#">Support</a>
</div>

</nav>

<section class="hero">

<div class="halo"></div>

<img src="LOGO_ARK_400x400.png" class="logo">

<h1>BOTALPHARK</h1>

<p>Le bot Discord ultime pour ton serveur ARK</p>

<a href="https://discord.com/oauth2/authorize?client_id=1478681103228342384&scope=bot%20applications.commands&permissions=8">

<button class="button">Ajouter le bot</button>

</a>

<button class="button">Dashboard</button>

</section>

<section class="stats">

<div class="stat">
<h2 id="servers">0</h2>
<p>Serveurs</p>
</div>

<div class="stat">
<h2 id="users">0</h2>
<p>Utilisateurs</p>
</div>

<div class="stat">
<h2 id="commands">0</h2>
<p>Commandes exécutées</p>
</div>



</section>

<footer>

<p>© 2026 BOTALPHARK</p>

</footer>

<script>

/* SIMULATION STATS BOT */

let servers = 150
let users = 8200
let commands = 450000

setInterval(()=>{

servers += Math.floor(Math.random()*2)
users += Math.floor(Math.random()*8)
commands += Math.floor(Math.random()*20)

document.getElementById("servers").innerText = servers
document.getElementById("users").innerText = users
document.getElementById("commands").innerText = commands

},2000)

</script>

</body>

</html>
