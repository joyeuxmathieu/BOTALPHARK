<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>BOTALPHARK</title>

<style>

/* RESET */

body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;
}

/* FOND ARK */

body{
background: radial-gradient(circle at center,#020617,#000814);
}

/* ETOILES */

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:starsMove 60s linear infinite;
z-index:-1;
}

@keyframes starsMove{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
opacity:0.8;
}

nav a:hover{
opacity:1;
}

/* HERO */

.hero{
text-align:center;
padding-top:120px;
padding-bottom:200px;
}

/* LOGO TEK */

.logo{
width:200px;
border-radius:20px;
margin-bottom:20px;

box-shadow:
0 0 20px #00e5ff,
0 0 40px #00e5ff,
0 0 80px #00e5ff;

animation:tekGlow 3s infinite alternate;
}

@keyframes tekGlow{

0%{
box-shadow:
0 0 10px #00e5ff,
0 0 30px #00e5ff;
}

100%{
box-shadow:
0 0 40px #00e5ff,
0 0 80px #00e5ff,
0 0 120px #00e5ff;
}

}

/* TITRE */

.hero h1{
font-size:70px;
margin:10px;
}

/* BOUTONS */

.button{
background:linear-gradient(45deg,#00e5ff,#4f46e5);
border:none;
padding:15px 35px;
color:white;
font-size:18px;
border-radius:12px;
cursor:pointer;
margin:10px;

box-shadow:0 0 20px rgba(0,229,255,0.7);

transition:0.3s;
}

.button:hover{
transform:scale(1.1);
box-shadow:0 0 40px rgba(0,229,255,1);
}

/* VAGUE */

.wave{
position:absolute;
bottom:-1px;
width:100%;
}

/* FEATURES */

.features{
background:#020617;
padding:120px 50px;
display:flex;
justify-content:center;
flex-wrap:wrap;
}

/* CARDS */

.card{
background:#111827;
padding:30px;
margin:20px;
border-radius:15px;
width:260px;
text-align:center;
transition:0.4s;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px rgba(0,229,255,0.4);
}

/* FOOTER */

footer{
background:#000814;
text-align:center;
padding:25px;
opacity:0.6;
}

</style>

</head>

<body>

<div class="stars"></div>

<nav>

<h2>🤖 BOTALPHARK</h2>

<div>
<a href="#">Accueil</a>
<a href="#">Fonctions</a>
<a href="#">Commandes</a>
<a href="#">Support</a>
</div>

</nav>

<section class="hero">

<img src="LOGO_ARK_400x400.png" class="logo">

<h1>BOTALPHARK</h1>

<p>Le bot Discord ultime pour ton serveur ARK</p>

<a href="https://discord.com/oauth2/authorize?client_id=1478681103228342384&scope=bot%20applications.commands&permissions=8">

<button class="button">Ajouter à Discord</button>

</a>

<button class="button">Dashboard</button>

</section>

<!-- VAGUE -->

<svg class="wave" viewBox="0 0 1440 320">

<path fill="#020617" fill-opacity="1"
d="M0,224L80,213.3C160,203,320,181,480,197.3C640,213,800,267,960,266.7C1120,267,1280,213,1360,186.7L1440,160L1440,320L0,320Z">

</path>

</svg>

<section class="features">

<div class="card">
<h3>💰 Economie</h3>
<p>Balance, shop et inventaire</p>
</div>

<div class="card">
<h3>⭐ Levels</h3>
<p>Système XP et classement</p>
</div>

<div class="card">
<h3>👮 Modération</h3>
<p>Ban, kick, mute et logs</p>
</div>

<div class="card">
<h3>🦖 ARK Tools</h3>
<p>Status serveur ARK en direct</p>
</div>

</section>

<footer>

<p>© 2026 BOTALPHARK</p>

</footer>

</body>

</html>
