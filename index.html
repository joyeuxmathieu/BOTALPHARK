<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>BOTALPHARK</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:linear-gradient(#020617,#020617),
url("https://images.unsplash.com/photo-1526401485004-2fda9f8a7d6f");
background-size:cover;
background-attachment:fixed;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,0.6);
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:16px;
}

/* HERO */

.hero{
text-align:center;
padding-top:120px;
padding-bottom:200px;
}

.logo{
width:200px;
margin-bottom:20px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

.hero h1{
font-size:70px;
margin:0;
}

.hero p{
opacity:0.8;
margin-bottom:20px;
}

/* BUTTON */

.button{
background:#4f46e5;
border:none;
padding:15px 30px;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin:10px;
}

/* TEK WAVE */

.wave{
position:absolute;
bottom:-1px;
width:100%;
}

/* FEATURES */

.features{
background:#111827;
padding:100px 50px;
display:flex;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:#1f2937;
padding:30px;
margin:20px;
border-radius:15px;
width:260px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

/* FOOTER */

footer{
background:#020617;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<nav>

<h2>🤖 BOTALPHARK</h2>

<div>

</div>

<img src="LOGO_ARK_400x400.png" class="logo">
